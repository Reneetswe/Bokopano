<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Become a Host - Bokopano</title>
    <meta name="description" content="Join Bokopano as a verified host">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
    
    <style>
        .host-page-container {
            min-height: 100vh;
            background: #FAF7F0;
            padding: 100px 24px 60px;
        }
        
        .host-header-card {
            max-width: 900px;
            margin: 0 auto 32px;
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid #efe7d8;
            border-radius: 16px;
            padding: 32px;
            text-align: center;
        }
        
        .host-header-card h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: var(--earth);
            margin-bottom: 12px;
        }
        
        .host-header-card p {
            color: var(--earth-medium);
            font-size: 1.125rem;
        }
        
        .back-link {
            display: inline-block;
            color: var(--clay);
            text-decoration: none;
            font-weight: 500;
            margin-bottom: 24px;
            transition: color 0.2s;
        }
        
        .back-link:hover {
            color: var(--clay-dark);
        }
        
        .auth-container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 4px 24px rgba(42, 31, 20, 0.12);
            border: 1px solid #efe7d8;
        }
        
        .auth-tabs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 32px;
        }
        
        .auth-tab {
            padding: 12px 24px;
            border-radius: 24px;
            border: none;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            background: #f5f5f5;
            color: var(--earth-medium);
        }
        
        .auth-tab.active {
            background: var(--clay);
            color: white;
        }
        
        .auth-tab:hover:not(.active) {
            background: #e8e8e8;
        }
        
        .form-section {
            display: none;
        }
        
        .form-section.active {
            display: block;
        }
        
        .form-field {
            margin-bottom: 20px;
        }
        
        .form-field label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--earth);
            margin-bottom: 8px;
        }
        
        .form-field input,
        .form-field select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #E8D5A3;
            border-radius: 8px;
            font-size: 16px;
            font-family: 'DM Sans', sans-serif;
            transition: border-color 0.2s;
        }
        
        .form-field input:focus,
        .form-field select:focus {
            outline: none;
            border-color: var(--clay);
        }
        
        .checkbox-field {
            display: flex;
            align-items: start;
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .checkbox-field input[type="checkbox"] {
            margin-top: 4px;
            width: auto;
        }
        
        .checkbox-field label {
            font-size: 14px;
            color: var(--earth-medium);
            margin: 0;
        }
        
        .error-message {
            background: #fee;
            border: 1px solid #fcc;
            color: #c33;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }
        
        .success-message {
            background: #efe;
            border: 1px solid #cfc;
            color: #3a3;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }
        
        .submit-btn {
            width: 100%;
            padding: 14px 32px;
            background: var(--clay);
            color: white;
            border: none;
            border-radius: 24px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .submit-btn:hover:not(:disabled) {
            background: var(--clay-dark);
            transform: translateY(-1px);
        }
        
        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <h1>Bokopano</h1>
            </div>
            <ul class="nav-menu">
                <li class="nav-item"><a href="/" class="nav-link">Home</a></li>
                <li class="nav-item"><a href="/#about" class="nav-link">About</a></li>
                <li class="nav-item"><a href="/#opportunities" class="nav-link">Opportunities</a></li>
                <li class="nav-item"><a href="/#contact" class="nav-link">Contact</a></li>
            </ul>
        </div>
    </nav>

    <div class="host-page-container">
        <div class="host-header-card">
            <a href="/" class="back-link">← Back to Home</a>
            <h1>Become a Host</h1>
            <p>Join Bokopano as a verified host and connect with passionate volunteers</p>
        </div>

        <div class="auth-container">
            <div class="auth-tabs">
                <button class="auth-tab active" onclick="switchTab('signup')">Create Account</button>
                <button class="auth-tab" onclick="switchTab('signin')">Sign In</button>
            </div>

            <div id="error-container"></div>
            <div id="success-container"></div>

            <!-- Sign Up Form -->
            <form id="signup-form" class="form-section active" onsubmit="handleSignup(event)">
                <div class="form-field">
                    <label for="signup-name">Full Name *</label>
                    <input type="text" id="signup-name" required placeholder="Your full name">
                </div>

                <div class="form-field">
                    <label for="signup-country">Country *</label>
                    <select id="signup-country" required>
                        <option value="Botswana">Botswana</option>
                        <option value="South Africa">South Africa</option>
                        <option value="Namibia">Namibia</option>
                        <option value="Zimbabwe">Zimbabwe</option>
                        <option value="Zambia">Zambia</option>
                        <option value="Mozambique">Mozambique</option>
                        <option value="Lesotho">Lesotho</option>
                        <option value="Eswatini">Eswatini</option>
                        <option value="Malawi">Malawi</option>
                        <option value="Angola">Angola</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <div class="form-field">
                    <label for="signup-email">Email *</label>
                    <input type="email" id="signup-email" required placeholder="you@example.com">
                </div>

                <div class="form-field">
                    <label for="signup-password">Password *</label>
                    <input type="password" id="signup-password" required placeholder="Create a strong password">
                </div>

                <div class="form-field">
                    <label for="signup-confirm">Confirm Password *</label>
                    <input type="password" id="signup-confirm" required placeholder="Re-enter password">
                </div>

                <div class="checkbox-field">
                    <input type="checkbox" id="signup-terms" required>
                    <label for="signup-terms">I agree to Bokopano's <a href="terms-of-service.html" target="_blank" rel="noopener">terms and conditions</a> and <a href="privacy-policy.html" target="_blank" rel="noopener">privacy policy</a></label>
                </div>

                <button type="submit" class="submit-btn" id="signup-btn">
                    Create Account & Continue
                </button>
            </form>

            <!-- Sign In Form -->
            <form id="signin-form" class="form-section" onsubmit="handleSignin(event)">
                <div class="form-field">
                    <label for="signin-email">Email *</label>
                    <input type="email" id="signin-email" required placeholder="you@example.com">
                </div>

                <div class="form-field">
                    <label for="signin-password">Password *</label>
                    <input type="password" id="signin-password" required placeholder="Enter your password">
                </div>

                <button type="submit" class="submit-btn" id="signin-btn">
                    Sign In & Continue
                </button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script>
        const API_BASE = 'https://bokopano.onrender.com/api';
        const SUPABASE_URL = 'https://dkhzdytwiwiktkunvozx.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRraHpkeXR3aXdpa3RrdW52b3p4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwOTkxNDQsImV4cCI6MjA5MTY3NTE0NH0.c10Mlo_YErUBF29hsKgmlLOGPkPrra1J80DtNFc0uMA';
        const sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        function switchTab(mode) {
            const signupTab = document.querySelector('.auth-tab:first-child');
            const signinTab = document.querySelector('.auth-tab:last-child');
            const signupForm = document.getElementById('signup-form');
            const signinForm = document.getElementById('signin-form');
            
            clearMessages();
            
            if (mode === 'signup') {
                signupTab.classList.add('active');
                signinTab.classList.remove('active');
                signupForm.classList.add('active');
                signinForm.classList.remove('active');
            } else {
                signinTab.classList.add('active');
                signupTab.classList.remove('active');
                signinForm.classList.add('active');
                signupForm.classList.remove('active');
            }
        }
        
        function showError(message) {
            clearMessages();
            const container = document.getElementById('error-container');
            container.innerHTML = `<div class="error-message">${message}</div>`;
        }
        
        function showSuccess(message) {
            clearMessages();
            const container = document.getElementById('success-container');
            container.innerHTML = `<div class="success-message">${message}</div>`;
        }
        
        function clearMessages() {
            document.getElementById('error-container').innerHTML = '';
            document.getElementById('success-container').innerHTML = '';
        }
        
        function setLoading(btnId, loading) {
            const btn = document.getElementById(btnId);
            if (loading) {
                btn.disabled = true;
                btn.innerHTML = '<span class="loading-spinner"></span> Please wait...';
            } else {
                btn.disabled = false;
                btn.innerHTML = btnId === 'signup-btn' ? 'Create Account & Continue' : 'Sign In & Continue';
            }
        }
        
        async function handleSignup(e) {
            e.preventDefault();
            clearMessages();
            
            const name = document.getElementById('signup-name').value;
            const country = document.getElementById('signup-country').value;
            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;
            const confirm = document.getElementById('signup-confirm').value;
            const terms = document.getElementById('signup-terms').checked;
            
            if (password !== confirm) {
                showError('Passwords do not match');
                return;
            }
            
            if (!terms) {
                showError('You must agree to the terms and conditions');
                return;
            }
            
            setLoading('signup-btn', true);

            localStorage.setItem('bokopano_host_prefill', JSON.stringify({
                fullName: name,
                country,
                email
            }));
            
            try {
                const response = await fetch(`${API_BASE}/auth/signup`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email,
                        password,
                        full_name: name,
                        country,
                        account_type: 'host'
                    })
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.error || 'Signup failed');
                }
                
                showSuccess('Account created! Please check your email to verify, then sign in to continue your host application.');
                switchTab('signin');
                document.getElementById('signin-email').value = email;
                document.getElementById('signup-form').reset();
            } catch (error) {
                showError(error.message || 'Failed to create account. Please try again.');
            } finally {
                setLoading('signup-btn', false);
            }
        }
        
        async function handleSignin(e) {
            e.preventDefault();
            clearMessages();
            
            const email = document.getElementById('signin-email').value;
            const password = document.getElementById('signin-password').value;
            
            if (!email || !password) {
                showError('Email and password are required');
                return;
            }

            setLoading('signin-btn', true);
            
            try {
                const { data, error } = await sbClient.auth.signInWithPassword({
                    email,
                    password
                });
                
                if (error) throw error;
                
                showSuccess('Signed in! Redirecting to dashboard...');
                setTimeout(() => {
                    window.location.href = '/host/dashboard';
                }, 1000);
            } catch (error) {
                const msg = error.message || '';
                if (msg.toLowerCase().includes('invalid') || msg.toLowerCase().includes('credentials')) {
                    showError('No account found with these credentials. Please sign up first using the "Create Account" tab above.');
                } else {
                    showError(msg || 'Failed to sign in. Please try again.');
                }
            } finally {
                setLoading('signin-btn', false);
            }
        }
    </script>
</body>
</html>
